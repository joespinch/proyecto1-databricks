bundle:
  name: proyecto1-databricks

variables:
  workspace_path:
    description: Databricks workspace destination path
    default: /Workspace/Shared/proyecto1-databricks
  node_type_id:
    description: Databricks node type for job clusters
    default: Standard_D8ds_v5
  spark_version:
    description: Databricks runtime version for job clusters
    default: 14.3.x-scala2.12

sync:
  include:
    - PrepAmb/**
    - proceso/**
    - reversion/**
    - seguridad/**
    - dashboard/**
    - datasets/**

targets:
  dev:
    default: true
    mode: production
    workspace:
      root_path: ${var.workspace_path}

resources:
  jobs:
    medallion_pipeline:
      name: proyecto1-medallion-pipeline
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: medallion_job_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 1
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
      tasks:
        - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/1.- Preparacion_Ambiente.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: ingest_circuits
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest circuits data.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: ingest_constructors
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest Constructors.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: ingest_races
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest racing data.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: transform
          depends_on:
            - task_key: ingest_circuits
            - task_key: ingest_constructors
            - task_key: ingest_races
          notebook_task:
            notebook_path: ./proceso/3.- Transform.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: ./proceso/4.- Load.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: grants_medallion
          depends_on:
            - task_key: load
          notebook_task:
            notebook_path: ./seguridad/4. Grants-Medallion.ipynb
          job_cluster_key: medallion_job_cluster
          max_retries: 2
          min_retry_interval_millis: 30000
