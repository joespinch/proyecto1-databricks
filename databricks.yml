bundle:
  name: proyecto1-databricks

variables:
  workspace_path:
    description: Databricks workspace destination path
    default: /Workspace/Shared/proyecto1-databricks
  existing_cluster_id:
    description: Existing Databricks cluster id for the medallion pipeline
    default: 0422-045407-iicc8d1c
  node_type_id:
    description: Databricks node type for job clusters
    default: Standard_D4ds_v4
  spark_version:
    description: Databricks runtime version for job clusters
    default: 14.3.x-scala2.12

sync:
  include:
    - PrepAmb/**
    - proceso/**
    - reversion/**
    - seguridad/**
    - dashboard/**
    - datasets/**

targets:
  dev:
    default: true
    mode: production
    workspace:
      root_path: ${var.workspace_path}

resources:
  jobs:
    medallion_pipeline:
      name: proyecto1-medallion-pipeline
      max_concurrent_runs: 1
      tasks:
        - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/1.- Preparacion_Ambiente.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: ingest_circuits
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest circuits data.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: ingest_constructors
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest Constructors.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: ingest_races
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ./proceso/2.- Ingest racing data.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: transform
          depends_on:
            - task_key: ingest_circuits
            - task_key: ingest_constructors
            - task_key: ingest_races
          notebook_task:
            notebook_path: ./proceso/3.- Transform.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: ./proceso/4.- Load.ipynb
          existing_cluster_id: ${var.existing_cluster_id}

        - task_key: grants_medallion
          depends_on:
            - task_key: load
          notebook_task:
            notebook_path: ./seguridad/4. Grants-Medallion.ipynb
          existing_cluster_id: ${var.existing_cluster_id}
