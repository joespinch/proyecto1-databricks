bundle:
  name: proyecto1-databricks

variables:
  workspace_path:
    description: Databricks workspace destination path
    default: /Workspace/Shared/proyecto1-databricks

sync:
  include:
    - PrepAmb/**
    - proceso/**
    - reversion/**
    - seguridad/**
    - dashboard/**
    - datasets/**

targets:
  dev:
    default: true
    mode: production
    workspace:
      root_path: ${var.workspace_path}

resources:
  jobs:
    medallion_pipeline:
      name: proyecto1-medallion-pipeline
      max_concurrent_runs: 1
      tasks:
        - task_key: prep_ambiente
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/1.- Preparacion_Ambiente.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: ingest_circuits
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/2.- Ingest circuits data.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: ingest_constructors
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/2.- Ingest Constructors.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: ingest_races
          depends_on:
            - task_key: prep_ambiente
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/2.- Ingest racing data.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: transform
          depends_on:
            - task_key: ingest_circuits
            - task_key: ingest_constructors
            - task_key: ingest_races
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/3.- Transform.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: ${workspace.root_path}/proceso/4.- Load.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: grants_medallion
          depends_on:
            - task_key: load
          notebook_task:
            notebook_path: ${workspace.root_path}/seguridad/4. Grants-Medallion.ipynb
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
