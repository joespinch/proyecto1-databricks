name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON, CSV and notebooks
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import json
          import pathlib
          import sys

          root = pathlib.Path('.')
          failures = []

          for path in root.rglob('*.json'):
              try:
                  json.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append(f"Invalid JSON: {path} -> {exc}")

          for path in root.rglob('*.ipynb'):
              try:
                  json.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append(f"Invalid notebook JSON: {path} -> {exc}")

          for path in root.rglob('*.csv'):
              try:
                  with path.open(newline='', encoding='utf-8') as fh:
                      reader = csv.reader(fh)
                      _ = next(reader, None)
              except Exception as exc:
                  failures.append(f"Unreadable CSV: {path} -> {exc}")

          if failures:
              print('\n'.join(failures))
              sys.exit(1)

          print('All JSON, CSV and notebook files are valid.')
          PY
