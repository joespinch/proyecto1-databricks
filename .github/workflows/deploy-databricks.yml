name: Deploy Databricks

on:
  workflow_dispatch:
    inputs:
      workspace_path:
        description: "Databricks workspace destination path"
        required: false
        default: "/Workspace/Shared/proyecto1-databricks"
  push:
    branches:
      - main
    paths:
      - "PrepAmb/**"
      - "proceso/**"
      - "reversion/**"
      - "seguridad/**"
      - "dashboard/**"
      - "datasets/**"
      - "databricks.yml"
      - ".github/workflows/deploy-databricks.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks secrets
        shell: bash
        run: |
          if [ -z "${DATABRICKS_HOST}" ] || [ -z "${DATABRICKS_TOKEN}" ]; then
            echo "Missing DATABRICKS_HOST or DATABRICKS_TOKEN secret"
            exit 1
          fi

      - name: Define deploy path
        id: cfg
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.workspace_path }}" ]; then
            echo "target=${{ github.event.inputs.workspace_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=/Workspace/Shared/proyecto1-databricks" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Databricks bundle
        shell: bash
        run: |
          databricks bundle validate -t dev --var "workspace_path=${{ steps.cfg.outputs.target }}"

      - name: Deploy Databricks bundle
        shell: bash
        run: |
          databricks bundle deploy -t dev --var "workspace_path=${{ steps.cfg.outputs.target }}"

      - name: Run medallion pipeline job
        shell: bash
        run: |
          databricks bundle run -t dev --var "workspace_path=${{ steps.cfg.outputs.target }}" medallion_pipeline
